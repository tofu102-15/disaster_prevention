<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html"><span class="brand-name">9月の防災ごはん</span><span class="brand-sub">備蓄チェック</span></a>
      <button class="nav-toggle" type="button" aria-label="メニュー" aria-expanded="false" data-nav-toggle>☰</button>
      <nav class="site-nav" aria-label="主要ナビゲーション" data-nav>
        <a href="index.html">トップ</a>
        <a href="checklist.html">チェックリスト</a>
        <a href="categories/stockpile-food.html">備蓄食</a>
        <a href="categories/typhoon.html">台風対策</a>
      </nav>
    </div>
  </header>
  <main class="main">
    <header class="article-header">
      <p class="eyebrow">保存できるチェックリスト</p>
      <h1>9月の防災備蓄チェックリスト</h1>
      <p class="lead">チェック状態はこの端末のブラウザに保存されます。台風前、防災週間、月初の見直しに使ってください。</p>
    </header>
    <section class="checklist-panel" data-checklist>
      <div class="checklist-group"><h2>水</h2>
        <label class="check-item"><input id="water-drink" type="checkbox">飲料水を人数分確認する</label>
        <label class="check-item"><input id="water-cook" type="checkbox">調理や手洗い用の水も用意する</label>
      </div>
      <div class="checklist-group"><h2>主食</h2>
        <label class="check-item"><input id="rice-pack" type="checkbox">パックごはん・アルファ化米を用意する</label>
        <label class="check-item"><input id="noodle-bread" type="checkbox">乾麺、即席麺、長期保存パンを確認する</label>
      </div>
      <div class="checklist-group"><h2>おかず</h2>
        <label class="check-item"><input id="side-can" type="checkbox">魚・肉・豆の缶詰をそろえる</label>
        <label class="check-item"><input id="side-retort" type="checkbox">レトルトカレーやスープを補充する</label>
      </div>
      <div class="checklist-group"><h2>常温保存食品</h2>
        <label class="check-item"><input id="stable-tofu" type="checkbox">常温保存豆腐や豆製品を確認する</label>
        <label class="check-item"><input id="stable-veg" type="checkbox">野菜ジュース、乾物、海藻類を用意する</label>
      </div>
      <div class="checklist-group"><h2>甘いもの</h2>
        <label class="check-item"><input id="sweet-choco" type="checkbox">チョコレート、ようかん、飴を入れる</label>
        <label class="check-item"><input id="sweet-child" type="checkbox">家族が食べ慣れたおやつを少量入れる</label>
      </div>
      <div class="checklist-group"><h2>カセットコンロ</h2>
        <label class="check-item"><input id="stove-body" type="checkbox">カセットコンロが使えるか確認する</label>
        <label class="check-item"><input id="stove-gas" type="checkbox">ガスボンベの本数と期限を確認する</label>
      </div>
      <div class="checklist-group"><h2>モバイルバッテリー</h2>
        <label class="check-item"><input id="battery-charge" type="checkbox">満充電にしておく</label>
        <label class="check-item"><input id="battery-cable" type="checkbox">家族分のケーブルを確認する</label>
      </div>
      <div class="checklist-group"><h2>ランタン</h2>
        <label class="check-item"><input id="lantern-led" type="checkbox">LEDランタンを用意する</label>
        <label class="check-item"><input id="lantern-battery" type="checkbox">電池や充電状態を確認する</label>
      </div>
      <div class="checklist-group"><h2>簡易トイレ</h2>
        <label class="check-item"><input id="toilet-kit" type="checkbox">簡易トイレを人数分用意する</label>
        <label class="check-item"><input id="toilet-bag" type="checkbox">ごみ袋、消臭袋、ウェットシートを確認する</label>
      </div>
      <div class="checklist-group"><h2>薬・衛生用品</h2>
        <label class="check-item"><input id="medicine" type="checkbox">常備薬、処方薬、お薬手帳を確認する</label>
        <label class="check-item"><input id="hygiene" type="checkbox">マスク、消毒、体温計、生理用品を用意する</label>
      </div>
      <div class="checklist-group"><h2>ペット用品</h2>
        <label class="check-item"><input id="pet-food" type="checkbox">ペットフードと水を用意する</label>
        <label class="check-item"><input id="pet-care" type="checkbox">トイレ用品、薬、キャリーを確認する</label>
      </div>
      <div class="checklist-group"><h2>高齢の親向け</h2>
        <label class="check-item"><input id="senior-food" type="checkbox">食べやすい主食・おかず・飲み物を確認する</label>
        <label class="check-item"><input id="senior-contact" type="checkbox">連絡方法、避難先、薬の場所を共有する</label>
      </div>
    </section>
    <section class="section related-list">
      <h2>関連記事</h2>

    </section>
  </main>

</body>
</html>
